<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700" role="img" aria-labelledby="title desc">
  <title id="title">Internal AI tools blueprint</title>
  <desc id="desc">A static blueprint of an internal AI tool workspace with permissions, domain context, interface, and audit modules.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#071315"/><stop offset="1" stop-color="#18211f"/></linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#dff7f3" stroke-opacity=".055"/></pattern>
  </defs>
  <rect width="900" height="700" rx="28" fill="url(#bg)"/>
  <rect width="900" height="700" fill="url(#grid)"/>
  <rect x="70" y="70" width="760" height="560" rx="16" fill="none" stroke="#dff7f3" stroke-opacity=".16"/>
  <g font-family="Arial, sans-serif" font-weight="700">
    <text x="96" y="124" fill="#dff7f3" font-size="25">INTERNAL AI TOOL BLUEPRINT</text>
    <text x="96" y="154" fill="#8fa8aa" font-size="15">permissions / domain context / interface / audit</text>
  </g>
  <g fill="none" stroke="#dff7f3" stroke-opacity=".16"><path d="M70 188H830M288 188V630M612 188V630"/></g>
  <g font-family="Arial, sans-serif" font-weight="700" fill="#dff7f3">
    <rect x="104" y="236" width="178" height="60" rx="8" fill="#081011" stroke="#12d7d1" stroke-opacity=".44"/>
    <text x="132" y="272" font-size="16">IDENTITY</text>
    <rect x="104" y="324" width="178" height="60" rx="8" fill="#081011" stroke="#12d7d1" stroke-opacity=".32"/>
    <text x="132" y="360" font-size="16">PERMISSIONS</text>
    <rect x="104" y="412" width="178" height="60" rx="8" fill="#081011" stroke="#12d7d1" stroke-opacity=".32"/>
    <text x="132" y="448" font-size="16">POLICY</text>
    <rect x="338" y="244" width="224" height="204" rx="12" fill="#0d1d1d" stroke="#f0bd58" stroke-opacity=".56"/>
    <text x="382" y="302" font-size="18">AI WORKSPACE</text>
    <path d="M378 334H522M378 366H510M378 398H488" stroke="#dff7f3" stroke-opacity=".32" stroke-width="8"/>
    <rect x="650" y="236" width="178" height="60" rx="8" fill="#081011" stroke="#dff7f3" stroke-opacity=".28"/>
    <text x="680" y="272" font-size="16">DATA ACCESS</text>
    <rect x="650" y="324" width="178" height="60" rx="8" fill="#081011" stroke="#dff7f3" stroke-opacity=".28"/>
    <text x="680" y="360" font-size="16">DOMAIN CONTEXT</text>
    <rect x="650" y="412" width="178" height="60" rx="8" fill="#081011" stroke="#dff7f3" stroke-opacity=".28"/>
    <text x="680" y="448" font-size="16">AUDIT TRAIL</text>
  </g>
  <g fill="none" stroke="#12d7d1" stroke-opacity=".55" stroke-width="3"><path d="M282 266H338M282 354H338M562 354H650M562 442H650"/></g>
</svg>
