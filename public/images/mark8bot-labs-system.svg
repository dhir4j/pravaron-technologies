    <rect x="430" y="250" width="286" height="80" rx="10" fill="#0d1d1d" stroke="#f0bd58" stroke-opacity=".56"/>
    <text x="466" y="298">POSTING ORCHESTRATOR</text>
    <rect x="430" y="378" width="286" height="80" rx="10" fill="#0d1d1d" stroke="#12d7d1" stroke-opacity=".44"/>
    <text x="466" y="426">AI REPLY ENGINE</text>
    <rect x="850" y="242" width="220" height="68" rx="9" fill="#081011" stroke="#dff7f3" stroke-opacity=".28"/>
    <text x="880" y="283">GROUP POSTS</text>
