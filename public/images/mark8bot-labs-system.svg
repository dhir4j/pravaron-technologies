    <path d="M330 290H430M330 416H430M716 290H850M716 418H850M716 418H790V496H850" stroke="#12d7d1" stroke-opacity=".58"/>
    <path d="M573 330V378" stroke="#f0bd58" stroke-opacity=".62"/>
