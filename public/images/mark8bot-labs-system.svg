<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Mark8bot product architecture blueprint</title>
  <desc id="desc">A static product architecture blueprint for Mark8bot showing campaign planning, posting, AI replies, direct messages, analytics, and accounts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#071315"/><stop offset="1" stop-color="#19211f"/></linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#dff7f3" stroke-opacity=".055"/></pattern>
  </defs>
  <rect width="1200" height="720" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#grid)"/>
  <rect x="70" y="64" width="1060" height="590" rx="18" fill="none" stroke="#dff7f3" stroke-opacity=".16" stroke-width="2"/>
  <g font-family="Arial, sans-serif" font-weight="700">
    <text x="100" y="122" fill="#dff7f3" font-size="30">MARK8BOT SYSTEM BLUEPRINT</text>
    <text x="100" y="156" fill="#8fa8aa" font-size="16">campaign manager / AI replies / group posting / analytics</text>
  </g>
  <g fill="none" stroke="#dff7f3" stroke-opacity=".13"><path d="M70 196H1130M70 526H1130M352 196V654M776 196V654"/></g>
  <g font-family="Arial, sans-serif" font-weight="700" fill="#dff7f3" font-size="19">
    <rect x="110" y="256" width="220" height="68" rx="9" fill="#081011" stroke="#12d7d1" stroke-opacity=".44"/>
    <text x="140" y="297">CAMPAIGN PLAN</text>
    <rect x="110" y="382" width="220" height="68" rx="9" fill="#081011" stroke="#12d7d1" stroke-opacity=".34"/>
