<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700" role="img" aria-labelledby="title desc">
  <title id="title">Decision intelligence blueprint</title>
  <desc id="desc">A static decision intelligence sheet with signal intake, scoring, recommendation, and audit trail blocks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#071315"/><stop offset="1" stop-color="#1b201c"/></linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#dff7f3" stroke-opacity=".055"/></pattern>
  </defs>
  <rect width="900" height="700" rx="28" fill="url(#bg)"/>
  <rect width="900" height="700" fill="url(#grid)"/>
  <g font-family="Arial, sans-serif" font-weight="700">
    <text x="72" y="98" fill="#dff7f3" font-size="25">DECISION INTELLIGENCE SHEET</text>
    <text x="72" y="128" fill="#8fa8aa" font-size="15">signals / scoring / recommendation / audit trail</text>
  </g>
  <g fill="none" stroke="#dff7f3" stroke-opacity=".16">
    <rect x="58" y="58" width="784" height="584" rx="16"/>
    <path d="M58 164H842M58 552H842M308 164V552M596 164V552"/>
  </g>
  <g font-family="Arial, sans-serif" font-weight="700" fill="#dff7f3">
    <text x="92" y="202" font-size="17" fill="#12d7d1">SIGNAL INTAKE</text>
    <text x="340" y="202" font-size="17" fill="#12d7d1">REASONING MODEL</text>
    <text x="628" y="202" font-size="17" fill="#f0bd58">RECOMMENDED ACTION</text>
    <rect x="92" y="234" width="180" height="42" rx="7" fill="#081011" stroke="#12d7d1" stroke-opacity=".38"/>
    <rect x="92" y="302" width="180" height="42" rx="7" fill="#081011" stroke="#12d7d1" stroke-opacity=".28"/>
    <rect x="92" y="370" width="180" height="42" rx="7" fill="#081011" stroke="#12d7d1" stroke-opacity=".28"/>
    <text x="118" y="261" font-size="16">CRM STATE</text>
    <text x="118" y="329" font-size="16">OPERATIONS</text>
    <text x="118" y="397" font-size="16">MARKET INPUT</text>
    <rect x="340" y="248" width="216" height="152" rx="10" fill="#0d1d1d" stroke="#dff7f3" stroke-opacity=".28"/>
    <text x="372" y="294" font-size="17">CONFIDENCE  82%</text>
    <text x="372" y="338" font-size="17">RISK CLASS  LOW</text>
    <text x="372" y="382" font-size="17">NEXT STEP   READY</text>
    <rect x="628" y="248" width="180" height="100" rx="10" fill="#0f1714" stroke="#f0bd58" stroke-opacity=".62"/>
    <text x="654" y="292" font-size="17">EXECUTE</text>
    <text x="654" y="322" font-size="15" fill="#8fa8aa">with review gate</text>
    <rect x="628" y="382" width="180" height="48" rx="7" fill="#081011" stroke="#dff7f3" stroke-opacity=".28"/>
    <text x="654" y="412" font-size="15">AUDIT RECORD</text>
  </g>
  <g fill="none" stroke="#12d7d1" stroke-opacity=".55" stroke-width="3"><path d="M272 255H340M272 323H340M272 391H340M556 324H628"/></g>
</svg>
